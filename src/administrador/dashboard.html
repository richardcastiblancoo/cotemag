<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/administrador.css">
    <link rel="manifest" href="/public/manifest.json">
    <link rel="shortcut icon" href="/public/iconos/logo5.png" type="image/x-icon">
    <title>Gestión de Estudiantes</title>
</head>
<body>

    <div class="container--2">

        <header>
            <div class="text-img">
                <img class="logo-cotemag" src="/public/iconos/logo5.png" alt="logo">
            </div>
            <nav class="navbar">
               <div class="container1"> <a class="container--3" href=""><img class="immg1" src="/public/svg/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">Inicio</a></div>
               <div class="container1"> <a class="container--3" href=""><img class="immg1" src="/public/svg/groups_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">Estudiantes</a></div>
                <div class="container1"><a class="container--3" href=""><img class="immg1" src="/public/svg/settings_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" alt="">Configuracion</a></div>
            </nav>
        </header>

        <div class="container">
            <h2>Gestión de Estudiantes</h2>
            <input type="text" id="search" placeholder="Buscar por cédula..." onkeyup="filterStudents()">
            <button onclick="showStudentForm()">Agregar Estudiante</button>

            <table>
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Edad</th>
                        <th>Correo</th>
                        <th>Cédula</th>
                        <th>Número</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>


    </div>

    <!-- aqui va los scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/script/tabladinamica.js"></script>
    <script src="/script/script.js"></script>
    <script src="/public/service-worker.js"></script>

</body>

</html>
